<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bluff Poker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="felt-bg"></div>
  <div class="felt-overlay"></div>

  <!-- MUTE TOGGLE -->
  <button class="mute-btn" id="muteBtn" title="Toggle Sound">
    <svg id="muteIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14" class="sound-wave sw1"></path>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07" class="sound-wave sw2"></path>
    </svg>
  </button>

  <!-- JOIN SCREEN -->
  <section id="joinView" class="view active">
    <div class="join-card">
      <div class="logo">
        <span class="logo-icon">♠</span>
        <h1>Bluff Poker</h1>
        <p class="tagline">Bet big. Lie bigger.</p>
      </div>
      <form id="joinForm" class="join-form">
        <input type="text" id="nameInput" placeholder="Enter your display name" maxlength="16" required autocomplete="off" />
        <button type="submit" class="btn btn-primary" id="joinBtn">Join Lobby</button>
      </form>
      <p class="join-status" id="joinStatus"></p>
    </div>
  </section>

  <!-- LOBBY -->
  <section id="lobbyView" class="view">
    <div class="lobby-container">
      <div class="lobby-header">
        <div>
          <p class="eyebrow">♠ Bluff Poker Lobby</p>
          <h2>Waiting for players...</h2>
        </div>
        <div class="lobby-actions">
          <button class="btn btn-gold" id="startGameBtn" disabled>Start Game</button>
          <button class="btn btn-ai" id="playAIBtn">
            <span class="ai-icon">🤖</span> Play vs Computer
          </button>
          <button class="btn btn-ghost" id="leaveLobbyBtn">Leave</button>
        </div>
      </div>

      <!-- AI DIFFICULTY PICKER (hidden by default) -->
      <div class="ai-picker" id="aiPicker" hidden>
        <div class="ai-picker-card">
          <h3>🤖 Choose Your Opponent</h3>
          <p class="ai-picker-sub">Select difficulty level</p>
          <div class="ai-difficulty-grid">
            <button class="ai-diff-btn" data-diff="easy">
              <span class="ai-diff-emoji">😎</span>
              <span class="ai-diff-name">Easy</span>
              <span class="ai-diff-desc">Cautious & predictable</span>
            </button>
            <button class="ai-diff-btn" data-diff="medium">
              <span class="ai-diff-emoji">🧠</span>
              <span class="ai-diff-name">Medium</span>
              <span class="ai-diff-desc">Balanced strategy</span>
            </button>
            <button class="ai-diff-btn" data-diff="hard">
              <span class="ai-diff-emoji">🔥</span>
              <span class="ai-diff-name">Hard</span>
              <span class="ai-diff-desc">Aggressive bluffer</span>
            </button>
            <button class="ai-diff-btn" data-diff="chaos">
              <span class="ai-diff-emoji">🃏</span>
              <span class="ai-diff-name">Chaos</span>
              <span class="ai-diff-desc">Totally unpredictable</span>
            </button>
          </div>
          <button class="btn btn-ghost ai-cancel-btn" id="aiCancelBtn">Cancel</button>
        </div>
      </div>

      <div class="players-grid" id="playersGrid"></div>
      <div class="leaderboard-section">
        <h3>🏆 Leaderboard</h3>
        <div id="leaderboardList" class="leaderboard-list"></div>
      </div>
    </div>
  </section>

  <!-- GAME TABLE -->
  <section id="gameView" class="view">
    <div class="game-container">
      <div class="game-topbar">
        <div class="game-info">
          <span class="phase-badge" id="phaseBadge">Betting</span>
          <span class="pot-display">Pot: <strong id="potDisplay">0</strong></span>
          <span class="ai-badge" id="aiBadge" hidden>🤖 VS COMPUTER</span>
        </div>
        <div class="my-chips">
          <span class="chip-icon">🪙</span>
          <strong id="myChipsDisplay">500</strong>
        </div>
      </div>

      <!-- OPPONENTS -->
      <div class="opponents-row" id="opponentsRow"></div>

      <!-- TABLE CENTER -->
      <div class="table-center">
        <div class="pot-area">
          <div class="pot-chips" id="potChips"></div>
          <p class="pot-label">Pot: <span id="potCenter">0</span></p>
        </div>
        <div class="game-message" id="gameMessage"></div>
      </div>

      <!-- MY HAND -->
      <div class="my-hand-area">
        <div class="my-cards" id="myCards"></div>
        <p class="hand-label" id="handLabel">Your Hand</p>
      </div>

      <!-- BETTING CONTROLS -->
      <div class="controls-area" id="controlsArea">
        <div class="bet-controls" id="betControls" hidden>
          <button class="btn btn-bet" data-action="fold">Fold</button>
          <button class="btn btn-bet" data-action="call">Call</button>
          <button class="btn btn-bet btn-raise" data-action="bet" data-amount="10">10</button>
          <button class="btn btn-bet btn-raise" data-action="bet" data-amount="25">25</button>
          <button class="btn btn-bet btn-raise" data-action="bet" data-amount="50">50</button>
          <button class="btn btn-bet btn-raise" data-action="bet" data-amount="100">100</button>
        </div>
        <div class="bluff-controls" id="bluffControls" hidden>
          <p class="bluff-prompt">Claim how strong your hand is:</p>
          <div class="bluff-options">
            <button class="btn btn-bluff" data-rank="1">High Card</button>
            <button class="btn btn-bluff" data-rank="2">Pair</button>
            <button class="btn btn-bluff" data-rank="3">Two Pair</button>
            <button class="btn btn-bluff" data-rank="4">Three of a Kind</button>
            <button class="btn btn-bluff" data-rank="5">Straight</button>
            <button class="btn btn-bluff" data-rank="6">Flush</button>
          </div>
        </div>
        <div class="callbluff-controls" id="callBluffControls" hidden>
          <p class="bluff-prompt">Call someone's bluff?</p>
          <div class="bluff-claims" id="bluffClaims"></div>
        </div>
      </div>

      <!-- ACTION LOG -->
      <div class="action-log" id="actionLog"></div>
    </div>
  </section>

  <!-- RESULTS OVERLAY -->
  <div class="results-overlay" id="resultsOverlay" hidden>
    <div class="results-card">
      <h2 id="resultsTitle">Round Over!</h2>
      <div id="resultsBody"></div>
      <button class="btn btn-primary" id="nextRoundBtn">Next Round</button>
      <button class="btn btn-ghost" id="backToLobbyBtn">Back to Lobby</button>
    </div>
  </div>

  <script type="module" src="app.js" crossorigin="anonymous"></script>
</body>
</html>
